ion": "AI可以幫助改善簡報的哪個方面？", "options": ["設計排版", "程式碼編寫", "網頁瀏覽", "資料庫管理"], "answer": "設計排版"}, {"question": "AI生成內容可能涉及的法律風險包括以下哪一項？", "options": ["用電量大", "系統過載", "誹謗與中傷", "硬碟空間不足"], "answer": "誹謗與中傷"}, {"question": "AI生成內容在什麼類型的應用特別展現了生成的能力？", "options": ["手動數據分析", "軟體手動測試", "圖片手動編修", "自動文案撰寫"], "answer": "自動文案撰寫"}, {"question": "AI生成內容在金融業的應用主要受到哪一個方面的限制？", "options": ["技術限制", "缺乏資料資源", "市場需求不足", "法律和規制問題"], "answer": "法律和規制問題"}, {"question": "AI生成內容在簡報生成中的最大挑戰之一是？", "options": ["資料安全", "生成速度", "頁面美觀性", "內容準確性"], "answer": "內容準確性"}, {"question": "AI生成內容在簡報生成中的應用，可以幫助使用者實現什麼？", "options": ["快速數據分析", "自動內容審核", "高效的內容生成", "網路安全保障"], "answer": "高效的內容生成"}, {"question": "AI生成內容有什麼優點？", "options": ["可以大規模自動生成高質量內容", "完全使用倒排索引檔案系統", "只進行非監督式學習的任務", "完全減少硬體使用和成本"], "answer": "可以大規模自動生成高質量內容"}, {"question": "AI生成內容技術如何生成符合使用者需求的內容？", "options": ["根據事先設定的規則生成", "分析使用者的語意", "使用隨機生成的方法", "無法生成符合需求的內容"], "answer": "分析使用者的語意"}, {"question": "AI生成內容技術為醫療領域帶來許多幫助，以下哪一項不是AI帶來的優勢？", "options": ["提高診斷準確性和效率", "自動化醫療記錄的生成和整理", "增加醫生的專業知識和技能", "提供個性化的醫療建議和治療方案"], "answer": "增加醫生的專業知識和技能"}, {"question": "AI生成內容的技術原理與工具中的監督學習意味著什麼？", "options": ["提供部分標記資料", "提供完全標記資料", "沒有提供任何標記資料", "只有人工智慧在學習"], "answer": "提供完全標記資料"}, {"question": "AI生成內容的哪一項趨勢正被用於創作個人化的市場營銷內容？", "options": ["生成式對抗網路(Generative Adversarial Network,GAN)", "人工標註", "自然語言生成(Natural Language Generation,NLG)", "靜態網頁設計"], "answer": "自然語言生成(Natural Language Generation,NLG)"}, {"question": "AI生成內容的運作過程中，哪一步需要收集大量資料集？", "options": ["模型架構", "評估和改進", "訓練", "生成過程"], "answer": "訓練"}, {"question": "AI生成內容是指基於哪個技術來生成各種形式的內容和資料？", "options": ["模糊邏輯", "雷達掃描", "深度學習 (Deep Learning, DL)", "視覺辨識"], "answer": "深度學習 (Deep Learning, DL)"}, {"question": "AI生成內容除了用於創作內容之外，還可以用於什麼任務？", "options": ["精準預測股市", "自動駕駛飛機", "代替醫生做手術", "自動回答問題和提供訊息"], "answer": "自動回答問題和提供訊息"}, {"question": "AI生成內容最早的應用是在哪個產業？", "options": ["醫療保健", "娛樂和影視業", "農業和食品生產", "建築和工程"], "answer": "娛樂和影視業"}, {"question": "AI生成內容會面臨的道德問題是？", "options": ["潛在的偏見和歧視", "資料大量增加問題", "演算法選擇和 er": "請幫我撰寫一個網頁版的踩地雷遊戲"}, {"question": "哪一個概念在AI生成內容資料治理中用來描述資料從生成到銷毀的整個過程？", "options": ["資料分析", "資料探勘", "資料生命週期管理", "資料可視化"], "answer": "資料生命週期管理"}, {"question": "哪一項是人工智慧倫理的重要目標？", "options": ["增加企業利潤", "提升使用者黏性", "減輕社會不平等", "優化技術性能"], "answer": "減輕社會不平等"}, {"question": "哪一種AI生成內容工具可以用來自動生成測驗和練習題來評估學生的學習進度？", "options": ["音樂播放器", "語音辨識軟體", "自動測驗生成器", "社群媒體平臺"], "answer": "自動測驗生成器"}, {"question": "哪一種生成式AI之應用，可以達到不侵犯隱私的方式並使用敏感資料？", "options": ["公開給大眾分享全部原始資料", "將數據傳至生成式AI合成新數據", "忽略各種資料的異常值、極端值與與缺失值", "生成不同資料孤島 (Data Silos) 使資料彼此隔離難以理解"], "answer": "生成不同資料孤島 (Data Silos) 使資料彼此隔離難以理解"}, {"question": "哪個AI功能可以自動推薦相關的圖片和圖表？", "options": ["智慧推薦", "語義分析", "視覺搜索", "圖片生成"], "answer": "智慧推薦"}, {"question": "哪個AI技術有助於簡報內容的自動化撰寫？", "options": ["自然語言生成", "自然語言理解", "機器學習", "人工神經網路"], "answer": "自然語言生成"}, {"question": "哪個因素最不可能受到提示工程 (Prompt Engineering) 的影響？", "options": ["AI回應的精確性", "AI使用的倫理考量", "AI生成內容的相關性", "AI輸出的創造性"], "answer": "AI使用的倫理考量"}, {"question": "哪個產業因其專業術語和概念的高度專業化，特別適合使用當地運行的小型AI模型？", "options": ["醫療保健", "旅遊業", "教育", "環境科學"], "answer": "醫療保健"}, {"question": "哪個模型以從隨機雜訊(random noise)產生逼真圖片而聞名？", "options": ["變換器 (Transformer)", "生成式對抗網路 (Generative Adversarial Network,GAN)", "卷積神經網路 (Convolutional Neural Network, CNN)", "循環神經網路 (Recurrent neural network, RNN)"], "answer": "生成式對抗網路 (Generative Adversarial Network,GAN)"}, {"question": "哪個模型專門用於生成新圖片？", "options": ["GAP", "深度神經網路 (Deep Neural Networks, DNN)", "生成式對抗網路 (Generative Adversarial Network,GAN)", "循環神經網路 (Recurrent neural network, RNN)"], "answer": "生成式對抗網路 (Generative Adversarial Network,GAN)"}, {"question": "哪項技術被認為是提升AI生成內容真實性和可信度的關鍵方法？", "options": ["卷積神經網路", "自迴歸模型", "生成式對抗網路", "強化學習"], "answer": "生成式對抗網路"}, {"question": "哪種生成式AI的應用，被廣泛用於內容創作和數位行銷中？", "options": ["自動翻譯系統", "圖片生成工具", "自動駕駛技術", "智慧推薦系統"], "answer": "圖片生成工具"}, {"question": "哪種自主學習方法利用AI生成內容技術來自動生成個人化學習計劃？", "options": ["傳統教學法", "標準化測試", "自適應學習系統", "訓練營"], "answer": "自適應學習系統"}, {"question": "根據歐盟《一般資料保護條例》(General Data Protection Regula ": "B. 數據偏見 (Data Bias)"}, {"question": "當生成式 AI 的結果不符合預期時，應採取何種策略來改進？", "options": ["更換AI模型", "修改或優化Prompt", "增加硬體設備", "改變作業系統"], "answer": "修改或優化Prompt"}, {"question": "當使用AI生成內容涉及到人物肖像時，以下哪一項是合法且合適的做法？", "options": ["獲得肖像權人的同意", "任意使用網路上找到的照片", "只要不盈利就可自由使用", "在使用後通知肖像權人"], "answer": "獲得肖像權人的同意"}, {"question": "當使用生成式AI創作歌詞時，如何確保歌詞的意境和表達風格？", "options": ["增加生成文字的字數", "使用特定詩人風格的訓練資料", "調整生成的Temperature參數", "使用基於規則的模型"], "answer": "使用特定詩人風格的訓練資料"}, {"question": "當使用生成式AI進行文字生成時，哪種操作有助於提升內容的相關性？", "options": ["使用具體的關鍵詞", "使用隨機數據", "分享影音連結", "減少輸入內容"], "answer": "使用具體的關鍵詞"}, {"question": "當使用生成式AI進行文字生成時，哪種操作有助於提升內容的相關性？", "options": ["使用具體的關鍵詞", "使用隨機數據", "分享影音連結", "減少輸入內容"], "answer": "使用具體的關鍵詞"}, {"question": "試圖理解所提供的資料結構和特徵，創造新的資料，請問是指哪種人工智慧的技術？", "options": ["監督式學習", "圖形辨識", "決策式AI", "生成式對抗網路(Generative Adversarial Network,GAN)"], "answer": "生成式對抗網路(Generative Adversarial Network,GAN)"}, {"question": "資料治理(Data Governance)的主要目的，以下何者正確？", "options": ["保證資料的可靠性、品質、完整度與安全性等", "增加資料的數量與規模", "限制人們對於資料的使用與分析", "降低資料的公開性與透明性"], "answer": "保證資料的可靠性、品質、完整度與安全性等"}, {"question": "資料治理(Data Governance)的效益，何者為非？", "options": ["取得可靠、安全、完善、可信任的資料", "增加複雜的管理架構及流程以降低效率", "符合企業的規範和法規遵循", "增進溝通效率並減少成本"], "answer": "增加複雜的管理架構及流程以降低效率"}, {"question": "資料治理的關鍵步驟，不包括以下哪一個項目？", "options": ["建立內部共識", "尋求主管機關公文同意", "權責劃分與政策落實", "技術架構的配套"], "answer": "尋求主管機關公文同意"}, {"question": "資料品質低落所造成的影響，何者為非？", "options": ["降低資料分析產生的價值", "可能引導決策者做出錯誤的判斷", "造成大量且重複的作業", "產出品質穩定的內容"], "answer": "產出品質穩定的內容"}, {"question": "資料處理是學習生成式AI須重視一環，根據歐盟《一般資料保護規範》(General Data Protection Regulation, GDPR)，個人資料在被處理時應遵循的基本原則之一是？", "options": ["資料最小化", "免費公開資料", "強制資料共享", "永久保存資料"], "answer": "資料最小化"}, {"question": "漸進式生成對抗網路如何改進高解析度圖片的生成？", "options": ["從低解析度圖片開始，逐步提高解析度", "透過壓縮圖片", "使用更簡單的神經網路", "透過應用濾色片"], "answer": "從低解析度圖片開始，逐步提高解析度"}, {"question": "語言模型的作用是什麼？", "options": ["預測未來事件", "理解和使用人類語言", "模擬人類行為", "生成圖片"], "answer": "理解和使用人類語言"}, {"question": "歐盟《可信任AI倫理準則》的三大核心要素中，以下哪一項不包含在內？", "options": ["合法性", "         let currentQuestions = [];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderQuestions() {
            const countInput = document.getElementById('numQuestions');
            let count = parseInt(countInput.value);
            if (isNaN(count) || count < 1) count = 30;
            if (count > quizData.length) count = quizData.length;
            
            const container = document.getElementById('quizContainer');
            const scoreDiv = document.getElementById('scoreDisplay');
            container.innerHTML = '';
            scoreDiv.innerHTML = '';
            
            // Randomize and pick count
            const shuffled = shuffle([...quizData]);
            currentQuestions = shuffled.slice(0, count);

            currentQuestions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.id = `q-${idx}`;
                
                const qTitle = document.createElement('p');
                qTitle.innerHTML = `<strong>${idx + 1}. ${escapeHtml(q.question)}</strong>`;
                qDiv.appendChild(qTitle);
                
                const optDiv = document.createElement('div');
                optDiv.className = 'options';
                
                q.options.forEach((opt, optIdx) => {
                    const label = document.createElement('label');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `q-${idx}`;
                    radio.value = opt; // using full string for matching
                    
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(' ' + opt));
                    optDiv.appendChild(label);
                });
                
                qDiv.appendChild(optDiv);
                container.appendChild(qDiv);
            });
            
            window.scrollTo(0, 0);
        }

        function checkAnswers() {
            let correctCount = 0;
            let answeredCount = 0;

            currentQuestions.forEach((q, idx) => {
                const qDiv = document.getElementById(`q-${idx}`);
                const selected = document.querySelector(`input[name="q-${idx}"]:checked`);
                
                // Clear previous feedback
                const oldFeedback = qDiv.querySelector('.correct-answer-display');
                if (oldFeedback) oldFeedback.remove();
                
                const userAnswer = selected ? selected.value.trim() : null;
                const correctAnswer = q.answer.trim();
                
                if (userAnswer) answeredCount++;

                if (userAnswer === correctAnswer) {
                    qDiv.className = 'question correct';
                    correctCount++;
                } else {
                    qDiv.className = 'question incorrect';
                    const feedback = document.createElement('div');
                    feedback.className = 'correct-answer-display';
                    feedback.innerText = `❌ 錯誤。正確答案是：${q.answer}`;
                    qDiv.appendChild(feedback);
                }
            });

            const scoreDiv = document.getElementById('scoreDisplay');
            scoreDiv.innerHTML = `
                <div class="score-box">
                    <h2>測驗結果</h2>
                    <p>得分：${correctCount} / ${currentQuestions.length} (${Math.round(correctCount/currentQuestions.length*100)}%)</p>
                    <p>答題數：${answeredCount} / ${currentQuestions.length}</p>
                </div>
            `;
            window.scrollTo(0, document.body.scrollHeight);
        }

        document.getElementById('refreshBtn').addEventListener('click', renderQuestions);
        document.getElementById('submitBtn').addEventListener('click', checkAnswers);
        
        // Initial load
        renderQuestions();
    </script>
